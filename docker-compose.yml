version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ridedelivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis

  worker-rides:
    build: .
    command: celery -A src.jobs.celery_app worker -Q rides -c 4 --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis

  worker-notifications:
    build: .
    command: celery -A src.jobs.celery_app worker -Q notifications -c 4 --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis

  worker-payments:
    build: .
    command: celery -A src.jobs.celery_app worker -Q payments -c 2 --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
